name: noor_athkar
description: Noor Islamic Athkar App — A premium digital sanctuary for daily remembrance.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  google_fonts: ^6.1.0
  provider: ^6.1.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  http: ^1.2.0
  adhan: ^2.0.0
  hijri_date: ^1.1.0
  flutter_local_notifications: ^18.0.1
  geolocator: ^14.0.2
  geocoding: ^3.0.0
  flutter_compass: ^0.8.1
  geomag: ^0.3.0
  timezone: ^0.10.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/data/

  fonts:
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700
flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/logo_transparent.png"
  min_sdk_android: 21
  adaptive_icon_background: "#004337"
  adaptive_icon_foreground: "assets/images/logo_transparent.png"

